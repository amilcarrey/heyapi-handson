name: Publish to npm

# Triggers:
# - workflow_run after Sync SDK completes successfully on main. We can't use
#   `push: paths: package.json` because PRs merged with the default GITHUB_TOKEN
#   do not fire push events (GitHub's anti-loop rule).
# - workflow_dispatch for manual re-publish (e.g. recover from a missed run).
#
# The "Detect version change" step compares HEAD vs HEAD~1 and exits early
# if package.json version is unchanged, so non-release merges are no-ops.

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Sync SDK from OpenAPI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write # to create the release tag

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Force main HEAD — workflow_run defaults to the SHA of the upstream
          # run, which may pre-date the merge commit produced by auto-merge.
          ref: main

      - name: Detect publishable version
        id: detect
        run: |
          name=$(jq -r .name package.json)
          version=$(jq -r .version package.json)
          echo "package=$name@$version"

          # If this exact version is already on npm, skip — the registry is the
          # source of truth, not the git diff (the publish workflow may run on
          # a commit that doesn't itself include the bump, e.g. when retriggered).
          if npm view "$name@$version" version --silent 2>/dev/null | grep -qx "$version"; then
            echo "::notice::$name@$version already on npm — skipping"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::$name@$version not on npm — will publish"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.detect.outputs.should_publish == 'true'

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.should_publish == 'true'
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install deps
        if: steps.detect.outputs.should_publish == 'true'
        run: pnpm install --frozen-lockfile

      - name: Regenerate SDK (ensures dist matches committed spec)
        if: steps.detect.outputs.should_publish == 'true'
        run: pnpm codegen

      - name: Build
        if: steps.detect.outputs.should_publish == 'true'
        run: pnpm build

      - name: Publish to npm
        if: steps.detect.outputs.should_publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # `pnpm publish` honours publishConfig.access from package.json.
        run: pnpm publish --no-git-checks

      - name: Create GitHub release tag
        if: steps.detect.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.detect.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "Published to npm as \`@amilcarrey/faker-openapi-sdk@${VERSION}\`. See CHANGELOG.md for details."
