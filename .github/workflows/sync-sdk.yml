name: Sync SDK from OpenAPI

on:
  workflow_dispatch:
  schedule:
    # Diario a las 06:00 UTC (fallback si el dispatch del faker falla)
    - cron: "0 6 * * *"
  repository_dispatch:
    # Disparado por openapi-trigger-faker cuando openapi.json cambia en main.
    types: [openapi-spec-updated]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Regenerate SDK from OpenAPI spec
        run: pnpm codegen

      - name: Verify typecheck still passes
        run: pnpm typecheck

      - name: Create Pull Request if SDK changed
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(sdk): regenerate from openapi spec"
          title: "chore(sdk): sync from openapi spec"
          body: |
            Auto-generated PR — el OpenAPI spec cambió y este PR trae el SDK regenerado.

            **Antes de mergear:**
            - [ ] Revisar el diff de `src/client-v1/` y `src/client-v2/` para confirmar que los cambios son esperados
            - [ ] Verificar que no haya breaking changes silenciosos (campos removidos, tipos cambiados, endpoints eliminados)
            - [ ] Si hay breaking changes, sumar un changeset major bump (cuando hayas configurado changesets)

            **Trigger info**
            - Event: `${{ github.event_name }}`
            - Source commit: `${{ github.event.client_payload.source_commit }}`
            - Spec sha256: `${{ github.event.client_payload.spec_sha }}`
          branch: chore/sync-sdk
          delete-branch: true
          add-paths: |
            src/client-v1/**
            src/client-v2/**
            src/client-faker/**
