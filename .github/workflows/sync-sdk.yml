name: Sync SDK from OpenAPI

on:
  workflow_dispatch:
  schedule:
    # Daily at 06:00 UTC (fallback if the faker dispatch fails)
    - cron: "0 6 * * *"
  repository_dispatch:
    # Fired by openapi-trigger-faker when openapi.json changes on main.
    types: [openapi-spec-updated]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      classification: ${{ steps.classify.outputs.classification }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create auto-merge --color 0e8a16 --description "Non-breaking sync, merges itself" --force
          gh label create needs-review --color d93f0b --description "Breaking change detected by oasdiff" --force

      - name: Download fresh faker spec
        env:
          # When triggered by repository_dispatch we pin by SHA (immutable URL,
          # bypasses raw.githubusercontent.com branch cache). Fallback to `main`
          # for workflow_dispatch / schedule.
          SOURCE_COMMIT: ${{ github.event.client_payload.source_commit }}
        run: |
          REF="${SOURCE_COMMIT:-main}"
          echo "Fetching spec at ref=$REF"
          curl -sSfL \
            "https://raw.githubusercontent.com/amilcarrey/openapi-trigger-faker/${REF}/openapi.json" \
            -o /tmp/openapi-faker.new.json

      - name: Classify diff with oasdiff
        id: classify
        run: |
          set +e
          # Run breaking check, capture exit + output
          breaking_out=$(docker run --rm \
            -v "$PWD/specs:/specs" \
            -v /tmp:/tmp \
            tufin/oasdiff:latest breaking \
              /specs/openapi-faker.json \
              /tmp/openapi-faker.new.json \
              --fail-on ERR 2>&1)
          breaking_exit=$?

          # Full changelog (markdown) — included in PR body for either case
          docker run --rm \
            -v "$PWD/specs:/specs" \
            -v /tmp:/tmp \
            tufin/oasdiff:latest changelog \
              /specs/openapi-faker.json \
              /tmp/openapi-faker.new.json \
              --format markup > /tmp/oasdiff-changelog.md 2>/dev/null || true
          set -e

          if [ $breaking_exit -ne 0 ]; then
            echo "classification=breaking" >> "$GITHUB_OUTPUT"
            echo "::notice::oasdiff detected BREAKING changes"
          else
            # No breaking. Tell minor (structural) from patch (doc-only).
            diff_out=$(docker run --rm \
              -v "$PWD/specs:/specs" \
              -v /tmp:/tmp \
              tufin/oasdiff:latest diff \
                /specs/openapi-faker.json \
                /tmp/openapi-faker.new.json \
                --exclude-elements description,examples,title,summary 2>/dev/null || true)

            if [ -z "$diff_out" ]; then
              echo "classification=patch" >> "$GITHUB_OUTPUT"
              echo "::notice::oasdiff: doc-only changes"
            else
              echo "classification=minor" >> "$GITHUB_OUTPUT"
              echo "::notice::oasdiff: non-breaking structural changes"
            fi
          fi

      - name: Build PR body
        id: body
        env:
          CLASSIFICATION: ${{ steps.classify.outputs.classification }}
          EVENT_NAME: ${{ github.event_name }}
          SOURCE_COMMIT: ${{ github.event.client_payload.source_commit }}
          SPEC_SHA: ${{ github.event.client_payload.spec_sha }}
        run: |
          changelog="$(cat /tmp/oasdiff-changelog.md 2>/dev/null || echo '_(no changelog produced)_')"
          if [ -z "${changelog// }" ]; then
            changelog="_(no structural changes detected by oasdiff)_"
          fi

          if [ "$CLASSIFICATION" = "breaking" ]; then
            status_line=":warning: **Breaking change** — manual review required. Auto-merge is disabled."
          else
            status_line=":white_check_mark: Non-breaking (\`${CLASSIFICATION}\`) — auto-merge enabled."
          fi

          {
            echo "body<<PR_BODY_EOF"
            echo "Auto-generated PR — the OpenAPI spec changed and the SDK has been regenerated."
            echo ""
            echo "${status_line}"
            echo ""
            echo "## Changelog (oasdiff)"
            echo ""
            echo "<details><summary>Show diff details</summary>"
            echo ""
            echo '```'
            echo "${changelog}"
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo "## Trigger info"
            echo ""
            echo "- Event: \`${EVENT_NAME}\`"
            echo "- Source commit: \`${SOURCE_COMMIT:-n/a}\`"
            echo "- Spec sha256: \`${SPEC_SHA:-n/a}\`"
            echo "PR_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update cached spec snapshot
        run: cp /tmp/openapi-faker.new.json specs/openapi-faker.json

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Regenerate SDK from OpenAPI spec
        run: pnpm codegen

      - name: Verify typecheck still passes
        run: pnpm typecheck

      - name: Create Pull Request if SDK changed
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(sdk): regenerate from openapi spec (${{ steps.classify.outputs.classification }})"
          title: "chore(sdk): sync from openapi spec [${{ steps.classify.outputs.classification }}]"
          body: ${{ steps.body.outputs.body }}
          branch: chore/sync-sdk
          delete-branch: true
          labels: ${{ steps.classify.outputs.classification == 'breaking' && 'needs-review' || 'auto-merge' }}
          add-paths: |
            specs/openapi-faker.json
            src/client-v1/**
            src/client-v2/**
            src/client-faker/**

      - name: Enable auto-merge for non-breaking PR
        if: steps.cpr.outputs.pull-request-number && steps.classify.outputs.classification != 'breaking'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"
